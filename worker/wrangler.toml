name = "bitecode-aimentor-worker"
main = "worker.js"
compatibility_date = "2025-10-19"

[vars]
# Minimum remaining ElevenLabs token/character budget required before creating a mentor session.
MIN_AVAILABLE_TOKENS = "2000"
DEBUG_MODE = "0"
AI_MENTOR_DAILY_LIMIT_ENABLED = "false"

[[d1_databases]]
binding = "DB"
database_name = "bitecode-sitedb-prod"
database_id = "0581ff0d-930a-42a6-b9c5-45b74a974a8d"

[[services]]
binding = "DEMO_ADMIN"
service = "bitecode-ai-mentor-demo"

[env.production]
# Add production secrets in Cloudflare dashboard.
# Production deploys use [env.production.vars], so update the values below or
# override them in the Cloudflare dashboard when testing token limits.

[[env.production.d1_databases]]
binding = "DB"
database_name = "bitecode-sitedb-prod"
database_id = "0581ff0d-930a-42a6-b9c5-45b74a974a8d"

[[env.production.services]]
binding = "DEMO_ADMIN"
service = "bitecode-ai-mentor-demo"

[env.production.vars]
MIN_AVAILABLE_TOKENS = "2000"
DEBUG_MODE = "0"
AI_MENTOR_DAILY_LIMIT_ENABLED = "false"
